<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GradFlow</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main id="main-container">
        <!-- Autenticacao -->
        <section id="auth-view">

            <!-- FORMULARIO DE LOGIN -->
            <form id="form-login">

                <h2>Fazer Login</h2>

                <div class="input-group">
                    <label for="login-user">Usuário</label>
                    <input id="login-user" type="text" placeholder="Informe seu usuário" required>
                </div>

                <div class="input-group">
                    <label for="login-pass">Senha</label>
                    <input id="login-pass" type="password" placeholder="Informe a senha" required>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
                <button type="button" class="btn-show-register">Cadastre-se</button>
            </form>


            <!-- FORMULARIO DE CADASTRO -->
             <form id="form-register" style="display: none;">

                <h2>Cadastre-se</h2>

                <div class="input-group">
                    <label for="register-user">Novo Usuário</label>
                    <input id="register-user" type="text" placeholder="Crie seu nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="register-pass">Nova Senha</label>
                    <input id="register-pass" type="password" placeholder="Crie sua senha" required>
                </div>

                <div class="input-group">
                    <label for="confirm-register-pass">Confirmar senha</label>
                    <input id="confirm-register-pass" type="password" placeholder="Confirme sua senha" required>
                </div>

                <button type="submit" class="btn-primary">Criar Conta</button>
                <button type="button" class="btn-cancel-register">Voltar</button>
             </form>
        </section>



        <!-- APP LOGADO-->
        <section id="app-view" style="display: none;">

            <!-- Header fixo do app -->
            <header>
            <h1 id="page-title">GradFlow</h1>
            <button id="btn-settings" style="background: transparent; border: none; font-size: 24px; cursor: pointer;">⚙️</button>
            </header>

            <!-- Conteudo dinamico -->
            <article id="content-area">
                <div id="view-faltas">
                    <h2 style="text-align: center; color: var(--brand-color); margin-bottom: 12px;">Minhas Faltas</h2>

                    <input type="text" id="input-pesquisa" placeholder="🔍 Pesquisar disciplina...">

                    <div id="lista-disciplinas" class="disciplinas"></div>
                </div>
                
                <div id="view-notas" style="display: none;">
                    <h2 style="text-align: center; color: var(--brand-color); margin-bottom: 12px;">Minhas Notas</h2>

                    <p style="text-align: center; color: #777;">Em construção...</p>
                </div>

                <div id="view-eventos" style="display: none;">
                    <h2 style="text-align: center; color: var(--brand-color); margin-bottom: 12px;">Meus Eventos</h2>
                    <p style="text-align: center; color: #777;">Em construção... 🚧</p>
                </div>

            </article>

            <!-- Barra de navegacao -->
            <nav class="bottom-nav">
                <ul>
                    <li><button id="nav-faltas" class="nav-btn-active">Faltas</button></li>
                    <li><button id="nav-notas" class="nav-btn">Notas</button></li>
                    <li><button id="nav-eventos" class="nav-btn">Eventos</button></li>
                </ul>
            </nav>

            <div id="settings-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Configurações</h2>
                    

                    <div class="modal-backup-actions">
                        <button id="btn-exportar" class="btn-backup btn-export">💾 Exportar Backup</button>
                        <input type="file" id="input-importar" accept=".json" style="display: none;">
                        <button id="btn-importar" class="btn-backup btn-import">📂 Importar Backup</button>
                    </div>

                    
                    <div style="border-top: 1px solid #eee; padding-top: 16px; margin-bottom: 8px;">
                        <p style="margin: 0 0 12px 0; font-weight: bold; color: #555; font-size: 14px;">Dados da Conta</p>
                        
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <input type="text" id="input-new-user" placeholder="Novo nome de usuário" style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%;">
                            
                            <input type="password" id="input-new-pass" placeholder="Nova senha" style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%;">
                        </div>
                    </div>

                    <button id="btn-save-changes" style="width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px;">Salvar Alterações</button>

                    <button id="btn-logout" class="btn-danger">Sair da Conta</button>
                    <button id="btn-close-settings" class="btn-secondary">Fechar</button>
                </div>
            </div>

            <div id="edit-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Editar Disciplina</h2>

                    <div class="edit-inputs">
                        <input type="text" id="input-edit-nome" placeholder="Nome da Disciplina">
                        <input type="number" id="input-edit-limite" placeholder="Limite de Faltas">
                    </div>

                    <button id="btn-save-edit">Salvar</button>
                    <button id="btn-cancel-edit" class="btn-secondary">Cancelar</button>
                </div>
            </div>

            <div id="fab-overlay" style="display: none;"></div>

            <div id="fab-container">
                <div id="fab-menu" style="display: none;">
                    <button id="btn-fab-disciplina">📚 Nova Disciplina</button>
                    <button id="btn-fab-evento">📅 Novo Evento</button>
                </div>
                <button id="fab-main">+</button>
            </div>

            <div id="create-disciplina-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Nova Disciplina</h2>
                    <div class="edit-inputs">
                        <input type="text" id="input-create-nome" placeholder="Nome da Disciplina">
                        <input type="number" id="input-create-limite" placeholder="Limite de Faltas">
                    </div>
                    <button id="btn-save-new-disciplina" style="width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 16px;">Criar Disciplina</button>
                    <button id="btn-cancel-new-disciplina" class="btn-secondary" style="margin-top: 8px;">Cancelar</button>
                </div>
            </div>

        </section>

    </main>

    <script src="./app.js"></script>
</body>
</html>
