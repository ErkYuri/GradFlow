<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GradFlow</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main id="main-container">
        <!-- Autenticacao -->
        <section id="auth-view">

            <!-- FORMULARIO DE LOGIN -->
            <form id="form-login">

                <h2>Fazer Login</h2>

                <div class="input-group">
                    <label for="login-user">Usuário</label>
                    <input id="login-user" type="text" placeholder="Informe seu usuário" required>
                </div>

                <div class="input-group">
                    <label for="login-pass">Senha</label>
                    <input id="login-pass" type="password" placeholder="Informe a senha" required>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
                <button type="button" class="btn-show-register">Cadastre-se</button>
            </form>


            <!-- FORMULARIO DE CADASTRO -->
            <form id="form-register" style="display: none;">

                <h2>Cadastre-se</h2>

                <div class="input-group">
                    <label for="register-user">Novo Usuário</label>
                    <input id="register-user" type="text" placeholder="Crie seu nome de usuário" required>
                </div>

                <div class="input-group">
                    <label for="register-pass">Nova Senha</label>
                    <input id="register-pass" type="password" placeholder="Crie sua senha" required>
                </div>

                <div class="input-group">
                    <label for="confirm-register-pass">Confirmar senha</label>
                    <input id="confirm-register-pass" type="password" placeholder="Confirme sua senha" required>
                </div>

                <button type="submit" class="btn-primary">Criar Conta</button>
                <button type="button" class="btn-cancel-register">Voltar</button>
            </form>
        </section>

        

        <!-- APP LOGADO-->
        <section id="app-view" style="display: none;">

            <!-- Header fixo do app -->
            <header style="display: flex; justify-content: space-between; align-items: center; background: var(--brand-color); padding: 16px; color: white;">
                <h1 id="page-title" style="margin: 0; font-size: 20px;">GradFlow</h1>
                <div style="display: flex; align-items: center; gap: 16px;">
                    
                    <button id="btn-settings" style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; padding: 4px;" title="Configurações">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>

                    <button id="btn-quick-logout" style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; padding: 4px;" title="Sair da Conta">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>

                </div>
            </header>

            <!-- Conteudo dinamico -->
            <article id="content-area">
                <div id="view-faltas">
                    <h2 style="text-align: center; color: var(--brand-color); margin-bottom: 12px;">Minhas Faltas</h2>

                    <input type="text" id="input-pesquisa" placeholder="Pesquisar disciplina...">

                    <div id="lista-disciplinas" class="disciplinas"></div>
                </div>
                
                <div id="view-notas" style="display: none;">
                    <h2 style="text-align: center; color: var(--brand-color); margin-bottom: 12px;">Minhas Notas</h2>

                    <input type="text" id="input-pesquisa" placeholder="Pesquisar disciplina...">

                    <div id=lista-notas class="disciplinas">

                    </div>
                </div>

                <div id="view-eventos" style="display: none; padding: 16px;">
                    <h2 style="text-align: center; color: var(--brand-color); margin-bottom: 20px;">Meus Eventos</h2>
                    
                    <div style="display: flex; background: #eee; padding: 4px; border-radius: 8px; margin-bottom: 20px; gap: 4px;">
                        <button id="filtro-btn-pendentes" style="flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; background: var(--brand-color); color: white; transition: background 0.2s;">Pendentes</button>
                        <button id="filtro-btn-concluidos" style="flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; background: transparent; color: #555; transition: background 0.2s;">Concluídos</button>
                        <button id="filtro-btn-todos" style="flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; background: transparent; color: #555; transition: background 0.2s;">Todos</button>
                    </div>
                    
                    <div id="lista-eventos"></div>
                </div>

            </article>

            <!-- Barra de navegacao -->
            <nav class="bottom-nav">
                <ul>
                    <li><button id="nav-faltas" class="nav-btn-active">Faltas</button></li>
                    <li><button id="nav-notas" class="nav-btn">Notas</button></li>
                    <li><button id="nav-eventos" class="nav-btn">Eventos</button></li>
                </ul>
            </nav>

            <!-- MODAL DE CONFIGURACOES -->
            <div id="settings-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Configurações</h2>
                    

                    <div class="modal-backup-actions" style="display: flex; gap: 8px; margin-bottom: 16px;">
                        <button id="btn-exportar" class="btn-backup btn-export" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: none; border-radius: 8px; background: #37474f; color: white; font-weight: bold; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Exportar
                        </button>
                        <input type="file" id="input-importar" accept=".json" style="display: none;">
                        <button id="btn-importar" class="btn-backup btn-import" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: none; border-radius: 8px; background: #78909c; color: white; font-weight: bold; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            Importar
                        </button>
                    </div>

                    
                    <div style="border-top: 1px solid #eee; padding-top: 16px; margin-bottom: 8px;">
                        <p style="margin: 0 0 12px 0; font-weight: bold; color: #555; font-size: 14px;">Dados da Conta</p>
                        
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            <input type="text" id="input-new-user" placeholder="Novo nome de usuário" style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%;">
                            
                            <input type="password" id="input-new-pass" placeholder="Nova senha" style="padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%;">
                        </div>
                    </div>

                    <button id="btn-save-changes" style="width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px;">Salvar Alterações</button>

                    <button id="btn-logout" class="btn-danger">Sair da Conta</button>
                    <button id="btn-close-settings" class="btn-secondary">Fechar</button>
                </div>
            </div>


            
            <!-- MODAL DE EDICAO DE DISCIPLINA -->
            <div id="edit-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Editar Disciplina</h2>

                    <div class="edit-inputs">
                        <input type="text" id="input-edit-nome" placeholder="Nome da Disciplina">
                        <input type="text" id="input-edit-professor" placeholder="Nome do Professor (Opcional)">
                        <input type="text" id="input-edit-sala" placeholder="Sala (Opcional)">
                        <input type="number" id="input-edit-limite" placeholder="Limite de Faltas">
                    </div>

                    <button id="btn-save-edit">Salvar</button>
                    <button id="btn-cancel-edit" class="btn-secondary">Cancelar</button>
                </div>
            </div>

            <!-- MODAL DE ADICIONAR NOTA -->
            <div id="modal-nova-nota" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2 id="titulo-modal-nota">Lançar Nota</h2>
                    <div class="nota-inputs">
                        <input type="text" id="input-nota-nome" placeholder="Ex.: Prova 1" required>
                        <input type="number" id="input-nota-valor" placeholder="Nota" required>
                    </div>

                    <button id="btn-save-nota" class="btn-primary">Salvar</button>
                    <button id="btn-cancel-nota" class="btn-secondary">Cancelar</button>
                </div>
            </div>

            <!-- BOTAO FLUTUANTE -->
            <div id="fab-overlay" style="display: none;"></div>

            <div id="fab-container">
                <div id="fab-menu" style="display: none;">
                    <button id="btn-fab-disciplina">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        Nova Disciplina
                    </button>
                    <button id="btn-fab-evento">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        Novo Evento
                    </button>
                </div>
                <button id="fab-main">+</button>
            </div>

            <!-- MODAL DE ADICIONAR DISCIPLINA -->
            <div id="create-disciplina-modal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Nova Disciplina</h2>
                    <div class="edit-inputs">
                        <input type="text" id="input-create-nome" placeholder="Nome da Disciplina">
                        <input type="text" id="input-create-professor" placeholder="Nome do Professor (Opcional)">
                        <input type="text" id="input-create-sala" placeholder="Sala (Opcional)">
                        <input type="number" id="input-create-limite" placeholder="Limite de Faltas">
                    </div>
                    <button id="btn-save-new-disciplina" style="width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 16px;">Criar Disciplina</button>
                    <button id="btn-cancel-new-disciplina" class="btn-secondary" style="margin-top: 8px;">Cancelar</button>
                </div>
            </div>

            <!-- MODAL HISTORICO DE NOTAS -->
            <div id="modal-historico" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Histórico de Notas</h2>

                    <div id="lista-historico" class="lista-historico">

                    </div>

                    <button id="btn-close-historico" class="btn-secondary">Fechar</button>
                </div>
            </div>

            <!-- ================================================================================ -->
            <!-- ----------------------- MODAL DE EVENTOS ----------------------- -->
            <!-- ================================================================================ -->

            <div id="modal-criar-evento" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2>Novo Evento</h2>
                    <div class="edit-inputs">
                        
                        <input type="text" id="input-evento-titulo" placeholder="Ex: Prova 2, Lista 1...">   

                        <select id="select-evento-tipo">
                            <option value="prova">Prova</option>
                            <option value="trabalho">Trabalho</option>
                            <option value="atividade">Atividade</option>
                            <option value="outros">Outros</option>
                        </select>

                        <select id="select-evento-disciplina">
                            <option value="">Carregando disciplinas...</option>
                        </select>

                        <input type="date" id="input-evento-data">

                        <div class="form-toggle">
                            <span style="font-weight: bold; color: #555; font-size: 14px;">Ativar Alerta</span>
                            <label class="switch">
                                <input type="checkbox" id="check-evento-lembrete" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>

                    <button id="btn-save-evento" class="btn-primary">Salvar</button>
                    <button id="btn-cancel-evento" class="btn-secondary">Cancelar</button>
                    
                </div>
            </div>
        </section>

    </main>
    <script src="app.js"></script>",
</body>
</html>
